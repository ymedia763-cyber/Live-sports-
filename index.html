<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CricStream - Live Cricket</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --bg: #08090f;
            --surface: #0f1117;
            --card: #13151e;
            --card2: #1a1d28;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #f0f2f8;
            --text2: #9ba3b8;
            --text3: #5a6278;
            --primary: #3b82f6;
            --primary-glow: rgba(59,130,246,0.25);
            --cyan: #06b6d4;
            --red: #ef4444;
            --red-glow: rgba(239,68,68,0.25);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245,158,11,0.2);
            --green: #10b981;
        }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* ── HEADER ── */
        .hdr {
            position: sticky; top: 0; z-index: 100;
            background: rgba(8,9,15,0.9);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }
        .hdr-inner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; height: 56px;
        }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-mark {
            width: 34px; height: 34px; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px var(--primary-glow);
            flex-shrink: 0;
        }
        .brand-name {
            font-size: 1.05rem; font-weight: 800; letter-spacing: -0.3px;
            background: linear-gradient(120deg, #fff 30%, var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-tag {
            font-size: 0.48rem; color: var(--text3);
            letter-spacing: 2.5px; text-transform: uppercase; line-height: 1;
        }
        .hdr-right { display: flex; align-items: center; gap: 7px; }

        .pill {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px;
            font-size: 0.62rem; font-weight: 600;
            border: 1px solid var(--border); color: var(--text3);
            transition: all 0.3s; white-space: nowrap;
        }
        .pill.live-pill {
            border-color: rgba(239,68,68,0.35);
            color: var(--red);
            background: rgba(239,68,68,0.08);
        }
        .pill.sync-ok {
            border-color: rgba(16,185,129,0.35);
            color: var(--green);
            background: rgba(16,185,129,0.08);
        }
        .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .live-pill .pill-dot { animation: blink 1.4s infinite; }

        @keyframes blink {
            0%,100% { opacity:1; box-shadow: 0 0 0 0 currentColor; }
            50% { opacity:0.6; box-shadow: 0 0 0 4px transparent; }
        }

        .hdr-time { font-size: 0.62rem; color: var(--text3); font-variant-numeric: tabular-nums; }

        /* ── MAIN ── */
        .main { padding: 14px 14px 32px; }

        /* ── EYEBROW ── */
        .eyebrow {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        }
        .e-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 6px;
            font-size: 0.58rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            white-space: nowrap;
        }
        .e-chip-blue {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.22);
            color: var(--primary);
        }
        .e-chip-red {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.22);
            color: var(--red);
        }
        .e-chip-yel {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.22);
            color: var(--yellow);
        }
        .e-line { flex: 1; height: 1px; background: var(--border); }
        .e-count {
            font-size: 0.6rem; color: var(--text3);
            background: var(--card); border: 1px solid var(--border);
            padding: 1px 8px; border-radius: 10px; white-space: nowrap;
        }

        /* ── FEATURED SECTION ── */
        .feat-wrap { margin-bottom: 24px; }

        /* Slider outer - FIXED for mobile */
        .slider-outer {
            position: relative;
            width: 100%;
            max-width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: var(--card);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        /* Slider track */
        .slider-track {
            display: flex;
            width: 100%;
            will-change: transform;
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── SLIDE - FIXED 16:9 ── */
        .slide {
            min-width: 100%;
            width: 100%;
            position: relative;
            flex-shrink: 0;
            display: block;
            cursor: pointer;
        }

        /* 16:9 image box - padding trick for exact ratio */
        .slide-img-box {
            width: 100%;
            position: relative;
            padding-top: 56.25%; /* 9/16 = 0.5625 */
            overflow: hidden;
            background: #0a0b12;
        }

        .slide-img-box img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* Top gradient */
        .slide-grad-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 38%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
            pointer-events: none;
        }

        /* Bottom gradient */
        .slide-grad-bot {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.55) 55%, transparent 100%);
            pointer-events: none;
        }

        /* Top badges row */
        .slide-top-row {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex; align-items: center; justify-content: space-between;
            pointer-events: none;
            z-index: 2;
        }

        .s-live-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--red); color: #fff;
            font-size: 0.56rem; font-weight: 800; letter-spacing: 1.5px;
            padding: 4px 10px; border-radius: 5px;
            box-shadow: 0 2px 12px var(--red-glow);
        }
        .s-live-dot { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: blink 1.2s infinite; }

        .s-up-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--yellow); color: #000;
            font-size: 0.56rem; font-weight: 800; letter-spacing: 1.5px;
            padding: 4px 10px; border-radius: 5px;
            box-shadow: 0 2px 12px var(--yellow-glow);
        }

        .s-cat-badge {
            background: rgba(0,0,0,0.5); color: #fff;
            font-size: 0.54rem; font-weight: 700; letter-spacing: 0.8px;
            padding: 3px 9px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
        }

        /* Play icon */
        .slide-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(255,255,255,0.13);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.25s;
            pointer-events: none;
            z-index: 2;
        }
        .slide:hover .slide-play {
            background: rgba(59,130,246,0.4);
            border-color: var(--primary);
        }

        /* Bottom content */
        .slide-foot {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px 12px 12px;
            pointer-events: none;
            z-index: 2;
        }
        .slide-title {
            font-size: 0.92rem; font-weight: 700; color: #fff;
            line-height: 1.3; margin-bottom: 8px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }

        /* Info strip - translucent black */
        .info-strip {
            background: rgba(0,0,0,0.52);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 9px;
            padding: 8px 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .strip-left { display: flex; align-items: center; gap: 8px; }
        .strip-icon {
            width: 28px; height: 28px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .strip-icon.red { background: rgba(239,68,68,0.2); }
        .strip-icon.yel { background: rgba(245,158,11,0.2); }
        .strip-label { font-size: 0.52rem; color: rgba(255,255,255,0.48); letter-spacing: 0.5px; margin-bottom: 2px; }
        .strip-val { font-size: 0.8rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
        .strip-right { text-align: right; }
        .strip-date { font-size: 0.58rem; color: rgba(255,255,255,0.5); line-height: 1.7; }
        .strip-live-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: blink 1.4s infinite; }

        /* Slider nav arrows */
        .sl-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        .sl-arrow:hover { background: rgba(59,130,246,0.4); border-color: var(--primary); }
        .sl-arrow.prev { left: 8px; }
        .sl-arrow.next { right: 8px; }

        /* Dots */
        .slider-dots {
            display: flex; justify-content: center; align-items: center;
            gap: 5px; padding: 10px 0 2px;
        }
        .dot {
            width: 5px; height: 5px; border-radius: 2.5px;
            background: var(--border2); cursor: pointer; transition: all 0.3s;
        }
        .dot.on { width: 18px; background: var(--primary); box-shadow: 0 0 8px var(--primary-glow); }

        /* ── SECTIONS ── */
        .sec-wrap { margin-bottom: 22px; }

        .scroll-row {
            display: flex; gap: 10px;
            overflow-x: auto; padding-bottom: 4px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-row::-webkit-scrollbar { height: 2px; }
        .scroll-row::-webkit-scrollbar-thumb { background: var(--border2); }

        /* ── LIVE CARD ── */
        .live-card {
            flex-shrink: 0; width: 182px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; cursor: pointer;
            scroll-snap-align: start;
            transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
            animation: cardIn 0.35s ease both;
        }
        .live-card:hover {
            transform: translateY(-3px);
            border-color: rgba(59,130,246,0.35);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .live-card:active { transform: scale(0.97); }

        @keyframes cardIn {
            from { opacity:0; transform: translateY(8px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .lc-thumb {
            position: relative; width: 100%;
            aspect-ratio: 16/9; overflow: hidden;
            background: #0a0b12;
        }
        .lc-thumb img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            display: block; transition: transform 0.35s;
        }
        .live-card:hover .lc-thumb img { transform: scale(1.05); }
        .lc-grad {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%, rgba(0,0,0,0.65) 100%);
        }
        .lc-live-tag {
            position: absolute; top: 6px; left: 6px;
            display: flex; align-items: center; gap: 3px;
            background: var(--red); color: #fff;
            font-size: 0.5rem; font-weight: 800; letter-spacing: 1.2px;
            padding: 2px 7px; border-radius: 3px;
            box-shadow: 0 2px 8px var(--red-glow);
        }
        .lc-live-dot { width: 3px; height: 3px; background: #fff; border-radius: 50%; animation: blink 1.2s infinite; }
        .lc-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(59,130,246,0.88);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .live-card:hover .lc-play { opacity: 1; }

        .lc-body { padding: 9px 10px 11px; }
        .lc-cat {
            display: inline-block; font-size: 0.5rem; font-weight: 700;
            letter-spacing: 0.8px; text-transform: uppercase;
            color: var(--primary); background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            padding: 1px 6px; border-radius: 3px; margin-bottom: 5px;
        }
        .lc-name { font-size: 0.75rem; font-weight: 600; color: var(--text); line-height: 1.35; }
        .lc-meta { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
        .lc-meta-dot { width: 5px; height: 5px; background: var(--red); border-radius: 50%; animation: blink 1.4s infinite; }
        .lc-meta-txt { font-size: 0.58rem; color: var(--text3); }

        /* ── UPCOMING CARD ── */
        .up-card {
            flex-shrink: 0; width: 182px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
            scroll-snap-align: start;
            transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
            animation: cardIn 0.35s ease both;
        }
        .up-card:hover {
            transform: translateY(-3px);
            border-color: rgba(245,158,11,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .uc-thumb {
            position: relative; width: 100%;
            aspect-ratio: 16/9; overflow: hidden;
            background: #0a0b12;
        }
        /* Clear thumbnail - no blur */
        .uc-thumb img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            display: block;
        }
        /* Light dim overlay */
        .uc-dim {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.32);
        }
        /* Top gradient */
        .uc-top-grad {
            position: absolute; top: 0; left: 0; right: 0; height: 38%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
        }
        /* Upcoming badge */
        .uc-badge {
            position: absolute; top: 7px; left: 7px;
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(245,158,11,0.9); color: #000;
            font-size: 0.48rem; font-weight: 800; letter-spacing: 1.5px;
            padding: 2px 8px; border-radius: 3px; text-transform: uppercase;
        }
        /* Countdown strip - bottom of thumb */
        .uc-strip {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.62);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 7px 10px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .uc-cd {
            font-size: 1rem; font-weight: 800; color: #fff;
            letter-spacing: 1.5px; font-variant-numeric: tabular-nums; line-height: 1;
        }
        .uc-cd-lbl {
            font-size: 0.44rem; color: rgba(255,255,255,0.42);
            letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;
        }
        .uc-dt {
            text-align: right; font-size: 0.56rem;
            color: rgba(255,255,255,0.52); line-height: 1.7;
        }

        .uc-body { padding: 9px 10px 11px; }
        .uc-cat {
            display: inline-block; font-size: 0.5rem; font-weight: 700;
            letter-spacing: 0.8px; text-transform: uppercase;
            color: var(--yellow); background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            padding: 1px 6px; border-radius: 3px; margin-bottom: 5px;
        }
        .uc-name { font-size: 0.75rem; font-weight: 600; color: var(--text); line-height: 1.35; }

        /* Empty */
        .empty-msg { font-size: 0.76rem; color: var(--text3); padding: 1rem 4px; white-space: nowrap; }

        /* ── PLAYER ── */
        .player-ovl {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.97);
            display: none; flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .player-ovl.on { display: flex; }

        .p-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; flex-shrink: 0;
        }
        .p-info { display: flex; align-items: center; gap: 7px; min-width: 0; flex: 1; }
        .p-live-tag {
            background: var(--red); color: #fff;
            font-size: 0.52rem; font-weight: 800; padding: 2px 7px;
            border-radius: 3px; letter-spacing: 1.5px; flex-shrink: 0;
        }
        .p-name { font-size: 0.84rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-close {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.08); border: none; color: #fff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .p-close:hover { background: var(--red); }

        .vid-box {
            position: relative; width: 100%; flex: 1;
            background: #000; cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .vid-box video { width: 100%; height: 100%; object-fit: contain; }

        .v-ctrls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 10px 14px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex; align-items: center; gap: 8px;
            opacity: 0; transition: opacity 0.22s; pointer-events: none;
        }
        .v-ctrls.on { opacity: 1; pointer-events: all; }

        .c-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.18s; flex-shrink: 0;
        }
        .c-btn:active { transform: scale(0.88); background: rgba(59,130,246,0.35); }

        .c-live-tag {
            margin-left: auto; display: flex; align-items: center; gap: 4px;
            background: rgba(239,68,68,0.85); color: #fff;
            font-size: 0.54rem; font-weight: 800; padding: 3px 9px;
            border-radius: 4px; letter-spacing: 1.5px;
        }
        .c-live-dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: blink 1.2s infinite; }

        .v-spin { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); display: none; }
        .v-spin.on { display: block; }
        .spinner { width: 42px; height: 42px; border: 3px solid rgba(59,130,246,0.15); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.85s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .v-err { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; display: none; }
        .v-err.on { display: block; }

        /* More */
        .more-bar {
            flex-shrink: 0; padding: 8px 14px 12px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid var(--border);
        }
        .more-lbl {
            font-size: 0.56rem; color: var(--text3);
            text-transform: uppercase; letter-spacing: 1.2px;
            margin-bottom: 7px; display: flex; align-items: center; gap: 5px;
        }
        .more-row { display: flex; gap: 7px; overflow-x: auto; }
        .more-row::-webkit-scrollbar { height: 2px; }
        .m-card {
            flex-shrink: 0; width: 90px; border-radius: 7px; overflow: hidden;
            cursor: pointer; border: 1px solid var(--border);
            background: var(--card2); transition: all 0.18s;
        }
        .m-card:hover { border-color: var(--primary); }
        .m-card:active { transform: scale(0.94); }
        .m-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .m-name { padding: 4px 6px; font-size: 0.58rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── FULLSCREEN ── */
        .fs-ovl { display: none; position: fixed; inset: 0; z-index: 500; background: #000; }
        .fs-ovl.on { display: block; }
        .fs-vid { width: 100%; height: 100%; object-fit: contain; }
        .fs-hdr {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 12px 14px;
            background: linear-gradient(rgba(0,0,0,0.8), transparent);
            display: flex; align-items: center; justify-content: space-between;
            opacity: 0; transition: opacity 0.22s; pointer-events: none; z-index: 10;
        }
        .fs-hdr.on { opacity: 1; pointer-events: all; }
        .fs-ctrls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 12px 14px 20px;

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ── FIREBASE ──
firebase.initializeApp({
    apiKey: "AIzaSyDzRrMTuQH4dTeRiHYw-sZ_UzQVvybtNjM",
    authDomain: "live-be661.firebaseapp.com",
    databaseURL: "https://live-be661-default-rtdb.firebaseio.com",
    projectId: "live-be661",
    storageBucket: "live-be661.firebasestorage.app",
    messagingSenderId: "153041970337",
    appId: "1:153041970337:web:28bb63dc535ef44ab93ce0"
});
const db = firebase.database();

// ── STATE ──
let data = {};
let hlsM = null, hlsF = null;
let ctrlT = null, fsCtrlT = null;
let paused = false, muted = false;
let fsPaused = false, fsMuted = false;
let curKey = null;
let slIdx = 0, slTimer = null, featList = [];

// ── CONNECTION ──
db.ref('.info/connected').on('value', snap => {
    const ok = snap.val();
    const p  = document.getElementById('fbPill');
    const t  = document.getElementById('fbPillTxt');
    p.className  = ok ? 'pill sync-ok' : 'pill';
    t.textContent = ok ? 'Live' : 'Sync';
});

// ── REALTIME LISTENER ──
db.ref('streams').on('value', snap => {
    data = snap.val() || {};
    renderAll();
});

// ── HELPERS ──
function getStatus(s) {
    const n = Date.now();
    if (n >= s.scheduleTimestamp && n <= s.endTimestamp) return 'live';
    if (n < s.scheduleTimestamp) return 'upcoming';
    return 'ended';
}

function fmtCD(ms) {
    if (ms <= 0) return '00:00:00';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtDate(ts) {
    return new Date(ts).toLocaleDateString([], { day:'2-digit', month:'short' });
}

function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

const PH = 'https://via.placeholder.com/400x225/0f1117/3b82f6?text=';

// ── RENDER ALL ──
function renderAll() {
    const arr  = Object.entries(data).map(([k,v]) => ({ key:k, ...v }));
    const live = arr.filter(s => getStatus(s) === 'live');
    const up   = arr.filter(s => getStatus(s) === 'upcoming').sort((a,b) => a.scheduleTimestamp - b.scheduleTimestamp);

    document.getElementById('hdrLive').textContent = live.length + ' Live';
    document.getElementById('liveCnt').textContent = live.length;
    document.getElementById('upCnt').textContent   = up.length;

    renderFeatured(live, up);
    renderLive(live);
    renderUp(up);
}

// ── FEATURED ──
function renderFeatured(live, up) {
    const lf = live.filter(s => s.featured);
    const uf = up.filter(s => s.featured);
    featList = [...lf, ...uf];

    const wrap = document.getElementById('featWrap');
    if (!featList.length) { wrap.style.display = 'none'; clearInterval(slTimer); return; }
    wrap.style.display = 'block';

    document.getElementById('sliderTrack').innerHTML = featList.map(s => {
        const st  = getStatus(s);
        const rem = s.scheduleTimestamp - Date.now();
        const img = s.thumbUrl || (PH + 'LIVE');

        if (st === 'live') {
            return `
            <div class="slide" onclick="openPlayer('${s.key}')">
                <div class="slide-img-box">
                    <img src="${img}" alt="${s.matchName}" onerror="this.src='${PH}LIVE'">
                </div>
                <div class="slide-grad-top"></div>
                <div class="slide-grad-bot"></div>
                <div class="slide-top-row">
                    <div class="s-live-badge"><div class="s-live-dot"></div>LIVE</div>
                    <div class="s-cat-badge">${s.category}</div>
                </div>
                <div class="slide-play">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </div>
                <div class="slide-foot">
                    <div class="slide-title">${s.matchName}</div>
                    <div class="info-strip">
                        <div class="strip-left">
                            <div class="strip-icon red">
                                <div class="strip-live-dot"></div>
                            </div>
                            <div>
                                <div class="strip-label">Streaming Live</div>
                                <div class="strip-val">Watch Now</div>
                            </div>
                        </div>
                        <div class="strip-right">
                            <div class="strip-date">${fmtDate(s.scheduleTimestamp)}<br>${fmtTime(s.scheduleTimestamp)}</div>
                        </div>
                    </div>
                </div>
            </div>`;
        } else {
            return `
            <div class="slide">
                <div class="slide-img-box">
                    <img src="${img}" alt="${s.matchName}" onerror="this.src='${PH}SOON'">
                </div>
                <div class="slide-grad-top"></div>
                <div class="slide-grad-bot"></div>
                <div class="slide-top-row">
                    <div class="s-up-badge">
                        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        Upcoming
                    </div>
                    <div class="s-cat-badge">${s.category}</div>
                </div>
                <div class="slide-foot">
                    <div class="slide-title">${s.matchName}</div>
                    <div class="info-strip">
                        <div class="strip-left">
                            <div class="strip-icon yel">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </div>
                            <div>
                                <div class="strip-label">Starts In</div>
                                <div class="strip-val" id="fcd-${s.key}">${fmtCD(rem)}</div>
                            </div>
                        </div>
                        <div class="strip-right">
                            <div class="strip-date">${fmtDate(s.scheduleTimestamp)}<br>${fmtTime(s.scheduleTimestamp)}</div>
                        </div>
                    </div>
                </div>
            </div>`;
        }
    }).join('');

    // Dots
    document.getElementById('sliderDots').innerHTML = featList.map((_,i) =>
        `<div class="dot${i===slIdx?' on':''}" onclick="goSlide(${i})"></div>`
    ).join('');

    const multi = featList.length > 1;
    document.getElementById('navPrev').style.display = multi ? 'flex' : 'none';
    document.getElementById('navNext').style.display = multi ? 'flex' : 'none';

    goSlide(slIdx < featList.length ? slIdx : 0, false);
    clearInterval(slTimer);
    if (multi) slTimer = setInterval(() => slideMove(1), 4500);
}

// ── SLIDER ──
function goSlide(i, anim=true) {
    if (!featList.length) return;
    slIdx = ((i % featList.length) + featList.length) % featList.length;
    const t = document.getElementById('sliderTrack');
    t.style.transition = anim ? 'transform 0.5s cubic-bezier(0.4,0,0.2,1)' : 'none';
    t.style.transform  = `translateX(-${slIdx * 100}%)`;
    document.querySelectorAll('.dot').forEach((d,j) => d.classList.toggle('on', j === slIdx));
}
function slideMove(d) {
    goSlide(slIdx + d);
    clearInterval(slTimer);
    if (featList.length > 1) slTimer = setInterval(() => slideMove(1), 4500);
}
window.slideMove = slideMove;
window.goSlide   = goSlide;

// ── LIVE ROW ──
function renderLive(live) {
    const row = document.getElementById('liveRow');
    if (!live.length) { row.innerHTML = '<div class="empty-msg">No live streams right now</div>'; return; }
    row.innerHTML = live.map((s,i) => `
        <div class="live-card" onclick="openPlayer('${s.key}')" style="animation-delay:${i*0.05}s">
            <div class="lc-thumb">
                <img src="${s.thumbUrl||PH+'LIVE'}" alt="${s.matchName}" onerror="this.src='${PH}LIVE'">
                <div class="lc-grad"></div>
                <div class="lc-live-tag"><div class="lc-live-dot"></div>LIVE</div>
                <div class="lc-play">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </div>
            </div>
            <div class="lc-body">
                <div class="lc-cat">${s.category}</div>
                <div class="lc-name">${s.matchName}</div>
                <div class="lc-meta">
                    <div class="lc-meta-dot"></div>
                    <span class="lc-meta-txt">Live Now</span>
                </div>
            </div>
        </div>`
    ).join('');
}

// ── UPCOMING ROW ──
function renderUp(up) {
    const row = document.getElementById('upRow');
    if (!up.length) { row.innerHTML = '<div class="empty-msg">No upcoming matches</div>'; return; }
    row.innerHTML = up.map((s,i) => {
        const rem = s.scheduleTimestamp - Date.now();
        return `
        <div class="up-card" style="animation-delay:${i*0.05}s">
            <div class="uc-thumb">
                <img src="${s.thumbUrl||PH+'SOON'}" alt="${s.matchName}" onerror="this.src='${PH}SOON'">
                <div class="uc-dim"></div>
                <div class="uc-top-grad"></div>
                <div class="uc-badge">Upcoming</div>
                <div class="uc-strip">
                    <div>
                        <div class="uc-cd" id="cd-${s.key}">${fmtCD(rem)}</div>
                        <div class="uc-cd-lbl">HH : MM : SS</div>
                    </div>
                    <div class="uc-dt">${fmtDate(s.scheduleTimestamp)}<br>${fmtTime(s.scheduleTimestamp)}</div>
                </div>
            </div>
            <div class="uc-body">
                <div class="uc-cat">${s.category}</div>
                <div class="uc-name">${s.matchName}</div>
            </div>
        </div>`;
    }).join('');
}

// ── COUNTDOWN TICK ──
setInterval(() => {
    Object.entries(data).forEach(([key, s]) => {
        if (getStatus(s) === 'upcoming') {
            const rem = s.scheduleTimestamp - Date.now();
            const e1  = document.getElementById('cd-'  + key);
            const e2  = document.getElementById('fcd-' + key);
            if (e1) e1.textContent = fmtCD(rem);
            if (e2) e2.textContent = fmtCD(rem);
        }
    });
}, 1000);

setInterval(renderAll, 30000);

// ── PLAYER ──
function openPlayer(key) {
    const s = data[key];
    if (!s || getStatus(s) !== 'live') return;
    curKey = key;
    document.getElementById('pName').textContent = s.matchName;
    document.getElementById('playerOvl').classList.add('on');
    document.body.style.overflow = 'hidden';
    startHls(s.m3u8Link, 'mainVid', h => hlsM = h);
    renderMore(key);
    paused = false; muted = false;
    updPI(); updMI();
}
window.openPlayer = openPlayer;

function closePlayer() {
    document.getElementById('playerOvl').classList.remove('on');
    document.body.style.overflow = '';
    stopHls(hlsM); hlsM = null;
    const v = document.getElementById('mainVid');
    v.pause(); v.src = '';
    curKey = null; hideCtrls();
}
window.closePlayer = closePlayer;

function startHls(url, vId, cb) {
    const vid  = document.getElementById(vId);
    const spin = document.getElementById('vSpin');
    const err  = document.getElementById('vErr');
    if (spin) spin.classList.add('on');
    if (err)  err.classList.remove('on');

    if (Hls.isSupported()) {
        const h = new Hls({ enableWorker:true, lowLatencyMode:true });
        h.loadSource(url); h.attachMedia(vid);
        h.on(Hls.Events.MANIFEST_PARSED, () => {
            if (spin) spin.classList.remove('on');
            vid.play().catch(()=>{});
        });
        h.on(Hls.Events.ERROR, (e,d) => {
            if (d.fatal) { if(spin) spin.classList.remove('on'); if(err) err.classList.add('on'); }
        });
        cb(h);
    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = url;
        vid.onloadedmetadata = () => { if(spin) spin.classList.remove('on'); vid.play().catch(()=>{}); };
        vid.onerror = () => { if(spin) spin.classList.remove('on'); if(err) err.classList.add('on'); };
        cb(null);
    } else {
        if (spin) spin.classList.remove('on');
        if (err)  err.classList.add('on');
        cb(null);
    }
}

function stopHls(h) { if (h) h.destroy(); }

function toggleCtrls() {
    document.getElementById('vCtrls').classList.contains('on') ? hideCtrls() : showCtrls();
}
function showCtrls() {
    document.getElementById('vCtrls').classList.add('on');
    clearTimeout(ctrlT);
    ctrlT = setTimeout(hideCtrls, 3500);
}
function hideCtrls() { document.getElementById('vCtrls').classList.remove('on'); }
window.toggleCtrls = toggleCtrls;

function tPause(e) {
    e.stopPropagation();
    const v = document.getElementById('mainVid');
    paused = !paused; paused ? v.pause() : v.play().catch(()=>{});
    updPI(); clearTimeout(ctrlT); ctrlT = setTimeout(hideCtrls, 3500);
}
function tMute(e) {
    e.stopPropagation();
    const v = document.getElementById('mainVid');
    muted = !muted; v.muted = muted;
    updMI(); clearTimeout(ctrlT); ctrlT = setTimeout(hideCtrls, 3500);
}
window.tPause = tPause;
window.tMute  = tMute;

function updPI() {
    document.getElementById('pauseIco').innerHTML = paused
        ? '<polygon points="5 3 19 12 5 21 5 3"/>'
        : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}
function updMI() {
    document.getElementById('muteIco').innerHTML = muted
        ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="white" stroke-width="2"/>'
        : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}

// ── FULLSCREEN ──
function enterFs(e) {
    e.stopPropagation();
    const s = data[curKey]; if (!s) return;
    document.getElementById('fsName').textContent = s.matchName;
    document.getElementById('fsOvl').classList.add('on');
    if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(()=>{});
    document.getElementById('mainVid').pause();
    fsPaused = false; fsMuted = muted;
    document.getElementById('fsVid').muted = fsMuted;
    startHls(s.m3u8Link, 'fsVid', h => hlsF = h);
    updFPI(); updFMI();
}
function exitFs() {
    document.getElementById('fsOvl').classList.remove('on');
    stopHls(hlsF); hlsF = null;
    const v = document.getElementById('fsVid'); v.pause(); v.src = '';
    if (screen.orientation?.unlock) screen.orientation.unlock();
    if (!paused) document.getElementById('mainVid').play().catch(()=>{});
}
function tFsCtrls() {
    const h = document.getElementById('fsHdr');
    const c = document.getElementById('fsCtrls');
    const show = c.classList.contains('on');
    h.classList.toggle('on', !show);
    c.classList.toggle('on', !show);
    if (!show) {
        clearTimeout(fsCtrlT);
        fsCtrlT = setTimeout(() => { h.classList.remove('on'); c.classList.remove('on'); }, 3500);
    }
}
window.enterFs   = enterFs;
window.exitFs    = exitFs;
window.tFsCtrls  = tFsCtrls;

function tFsPause() {
    const v = document.getElementById('fsVid');
    fsPaused = !fsPaused; fsPaused ? v.pause() : v.play().catch(()=>{});
    updFPI();
}
function tFsMute() {
    const v = document.getElementById('fsVid');
    fsMuted = !fsMuted; v.muted = fsMuted;
    updFMI();
}
window.tFsPause = tFsPause;
window.tFsMute  = tFsMute;

function updFPI() {
    document.getElementById('fsPIco').innerHTML = fsPaused
        ? '<polygon points="5 3 19 12 5 21 5 3"/>'
        : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}
function updFMI() {
    document.getElementById('fsMIco').innerHTML = fsMuted
        ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="white" stroke-width="2"/>'
        : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}

// ── MORE STREAMS ──
function renderMore(ck) {
    const live = Object.entries(data)
        .filter(([k,s]) => getStatus(s) === 'live' && k !== ck)
        .map(([k,s]) => ({ key:k, ...s }));
    const row = document.getElementById('moreRow');
    if (!live.length) {
        row.innerHTML = '<div style="color:var(--text3);font-size:0.7rem;padding:4px;">No other streams</div>';
        return;
    }
    row.innerHTML = live.map(s => `
        <div class="m-card" onclick="switchSt('${s.key}')">
            <img class="m-img" src="${s.thumbUrl||PH+'LIVE'}" alt="${s.matchName}" onerror="this.src='${PH}LIVE'">
            <div class="m-name">${s.matchName}</div>
        </div>`
    ).join('');
}

function switchSt(key) {
    const s = data[key]; if (!s) return;
    curKey = key;
    document.getElementById('pName').textContent = s.matchName;
    stopHls(hlsM); hlsM = null;
    startHls(s.m3u8Link, 'mainVid', h => hlsM = h);
    renderMore(key); paused = false; updPI();
}
window.switchSt = switchSt;

// ── TIME ──
setInterval(() => {
    document.getElementById('hdrTime').textContent =
        new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}, 1000);
document.getElementById('hdrTime').textContent =
    new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePlayer(); exitFs(); }
});
</script>
</body>
</html>
