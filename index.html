<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamLive - Watch Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --bg-dark: #0a0a12; --bg-card: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.06); --text: #f8fafc; --text-muted: #64748b; --live: #ef4444; --success: #10b981; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; z-index: -1; animation: float 20s infinite ease-in-out; }
        .bg-orb:nth-child(1) { width: 300px; height: 300px; background: var(--primary); top: -100px; right: -100px; }
        .bg-orb:nth-child(2) { width: 250px; height: 250px; background: var(--secondary); bottom: 10%; left: -80px; opacity: 0.25; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -30px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } }
        .header { background: rgba(10, 10, 18, 0.85); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .brand-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .live-pulse { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--live); }
        .pulse-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px 30px; }
        .featured-section { margin: 24px 0; position: relative; }
        .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 14px; padding-left: 4px; }
        .slider-container { position: relative; overflow: hidden; border-radius: 20px; height: 200px; }
        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slide { min-width: 100%; position: relative; cursor: pointer; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 50px 20px 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); }
        .slide-badge { display: inline-block; background: linear-gradient(135deg, var(--secondary), #f43f5e); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .slide-title { font-size: 18px; font-weight: 700; line-height: 1.3; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: 14px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s; }
        .dot.active { background: var(--primary); width: 24px; border-radius: 4px; }
        .tabs { display: flex; gap: 8px; margin: 28px 0 20px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 700; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25); }
        .tab-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; background: rgba(255,255,255,0.2); border-radius: 10px; font-size: 11px; margin-left: 6px; }
        .streams-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .stream-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s; animation: cardEnter 0.5s ease backwards; }
        .stream-card:active { transform: scale(0.97); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .card-status { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; backdrop-filter: blur(10px); }
        .status-live { background: rgba(239, 68, 68, 0.9); color: white; animation: pulse 2s infinite; }
        .status-upcoming { background: rgba(99, 102, 241, 0.9); color: white; }
        .card-body { padding: 12px; }
        .card-title { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-timer { font-size: 11px; font-weight: 700; color: var(--text-muted); font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
        .timer-value { color: var(--primary); font-weight: 800; }
        .player-screen { display: none; flex-direction: column; min-height: 100vh; background: var(--bg-dark); }
        .player-screen.active { display: flex; }
        .player-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: rgba(10, 10, 18, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: all 0.2s; }
        .back-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }
        .player-top-title { font-size: 15px; font-weight: 700; flex: 1; margin: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: var(--live); text-transform: uppercase; letter-spacing: 1px; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .blur-overlay { position: absolute; inset: 0; backdrop-filter: blur(12px); background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 5; pointer-events: none; }
        .blur-overlay.active { display: flex; }
        .loading-dots { display: flex; align-items: center; gap: 8px; }
        .loading-dots span { width: 10px; height: 10px; background: white; border-radius: 50%; animation: dotBounce 1.4s infinite ease-in-out both; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        .controls-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 10; opacity: 1; transition: opacity 0.3s ease; }
        .controls-bar.hidden { opacity: 0; pointer-events: none; }
        .ctrl-left, .ctrl-center, .ctrl-right { display: flex; align-items: center; gap: 8px; }
        .ctrl-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.22); }
        .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .live-badge-small { display: flex; align-items: center; gap: 5px; background: rgba(239, 68, 68, 0.85); color: white; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .live-badge-small::before { content: ''; width: 5px; height: 5px; background: white; border-radius: 50%; animation: pulse 2s infinite; }
        .more-section { flex: 1; padding: 20px 16px; overflow-y: auto; }
        .more-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 16px; }
        .more-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .more-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .more-card:active { transform: scale(0.97); }
        .more-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .more-card-info { padding: 10px 12px; }
        .more-card-title { font-size: 12px; font-weight: 700; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .more-card-status { font-size: 10px; font-weight: 700; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .more-status-live { color: var(--live); }
        .more-status-upcoming { color: var(--primary); }
        .upcoming-preview { display: none; flex-direction: column; min-height: 100vh; background: var(--bg-dark); }
        .upcoming-preview.active { display: flex; }
        .upcoming-thumb-area { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; }
        .upcoming-thumb-area img { width: 100%; height: 100%; object-fit: cover; }
        .upcoming-thumb-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%, rgba(0,0,0,0.3) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
        .upcoming-status-badge { background: rgba(99, 102, 241, 0.9); color: white; padding: 6px 18px; border-radius: 30px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; backdrop-filter: blur(10px); }
        .countdown-box { display: flex; gap: 12px; align-items: center; }
        .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .countdown-value { width: 56px; height: 56px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .countdown-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .countdown-sep { font-size: 24px; font-weight: 800; color: var(--text-muted); margin-top: -16px; }
        .upcoming-info { padding: 24px 20px; }
        .upcoming-name { font-size: 22px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
        .upcoming-schedule { font-size: 14px; color: var(--text-muted); }
        .app-loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease, visibility 0.6s; }
        .app-loader.hidden { opacity: 0; visibility: hidden; }
        .loader-brand { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; letter-spacing: -1px; }
        .loader-dots { display: flex; gap: 10px; }
        .loader-dots span { width: 12px; height: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; animation: loaderBounce 1.4s infinite ease-in-out both; }
        @keyframes loaderBounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); grid-column: 1 / -1; }
        .empty-state svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.3; }
        .hidden-section { display: none; }
        ::-webkit-scrollbar { display: none; }
        body { scrollbar-width: none; }
    </style>
</head>
<body>
<div class="app-loader" id="appLoader"><div class="loader-brand">StreamLive</div><div class="loader-dots"><span></span><span></span><span></span></div></div>
<div class="bg-orb"></div><div class="bg-orb"></div>

<div id="homeScreen">
  <header class="header"><div class="header-content"><div class="brand"><div class="brand-icon">S</div><div class="brand-text">StreamLive</div></div><div class="live-pulse"><div class="pulse-dot"></div><span>LIVE</span></div></div></header>
  <div class="container">
    <div class="featured-section" id="featuredSection" style="display: none;"><div class="section-label">Featured Streams</div><div class="slider-container"><div class="slider-track" id="sliderTrack"></div></div><div class="slider-dots" id="sliderDots"></div></div>
    <div class="tabs"><button class="tab active" onclick="switchTab('live')" id="tab-live">Live Now <span class="tab-badge" id="count-live">0</span></button><button class="tab" onclick="switchTab('upcoming')" id="tab-upcoming">Upcoming <span class="tab-badge" id="count-upcoming">0</span></button></div>
    <div class="streams-grid" id="liveGrid"></div>
    <div class="streams-grid hidden-section" id="upcomingGrid"></div>
  </div>
</div>

<div class="upcoming-preview" id="upcomingPreview">
  <div class="player-top-bar"><button class="back-btn" onclick="closeUpcomingPreview()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><div class="player-top-title" id="upcomingTitle"></div><div style="width:40px;"></div></div>
  <div class="upcoming-thumb-area"><img id="upcomingThumbImg" alt=""><div class="upcoming-thumb-overlay"><div class="upcoming-status-badge">Coming Soon</div><div class="countdown-box" id="countdownBox"><div class="countdown-unit"><div class="countdown-value" id="cd-days">00</div><div class="countdown-label">Days</div></div><div class="countdown-sep">:</div><div class="countdown-unit"><div class="countdown-value" id="cd-hours">00</div><div class="countdown-label">Hours</div></div><div class="countdown-sep">:</div><div class="countdown-unit"><div class="countdown-value" id="cd-minutes">00</div><div class="countdown-label">Mins</div></div><div class="countdown-sep">:</div><div class="countdown-unit"><div class="countdown-value" id="cd-seconds">00</div><div class="countdown-label">Secs</div></div></div></div></div>
  <div class="upcoming-info"><div class="upcoming-name" id="upcomingName"></div><div class="upcoming-schedule" id="upcomingSchedule"></div></div>
</div>

<div class="player-screen" id="playerScreen">
  <div class="player-top-bar"><button class="back-btn" onclick="closePlayer()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><div class="player-top-title" id="playerTitle"></div><div class="live-indicator"><div class="pulse-dot" style="width:6px;height:6px;"></div>LIVE</div></div>
  <div class="video-container" id="videoContainer"><video id="videoPlayer" playsinline preload="auto"></video><div class="blur-overlay" id="blurOverlay"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    <div class="controls-bar" id="controlsBar"><div class="ctrl-left"><button class="ctrl-btn" id="playBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button><button class="ctrl-btn" id="muteBtn"><svg viewBox="0 0 24 24" id="muteIconSvg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div><div class="ctrl-center"><div class="live-badge-small">LIVE</div></div><div class="ctrl-right"><button class="ctrl-btn" id="fullscreenBtn"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button></div></div>
  </div>
  <div class="more-section"><div class="more-title">More Streams</div><div class="more-grid" id="moreGrid"></div></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDzRrMTuQH4dTeRiHYw-sZ_UzQVvybtNjM",
        authDomain: "live-be661.firebaseapp.com",
        databaseURL: "https://live-be661-default-rtdb.firebaseio.com",
        projectId: "live-be661",
        storageBucket: "live-be661.firebasestorage.app",
        messagingSenderId: "153041970337",
        appId: "1:153041970337:web:28bb63dc535ef44ab93ce0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const streamsRef = db.ref('streams');

    let allStreams = [];         // array of {id, thumbnail, name, m3u8Url, scheduleTime, featured}
    let currentHls = null, controlsTimeout = null, sliderInterval = null, currentSlide = 0;
    let currentStreamId = null, isBuffering = false, upcomingTimerInterval = null, controlsVisible = true;
    let pendingUpcomingId = null; // used to auto-switch when upcoming becomes live

    function isLive(stream) { return new Date() >= new Date(stream.scheduleTime); }
    function getTimeRemaining(scheduleTime) { const total = new Date(scheduleTime) - new Date(); if (total <= 0) return null; const days = Math.floor(total / 86400000), hours = Math.floor((total % 86400000) / 3600000), minutes = Math.floor((total % 3600000) / 60000), seconds = Math.floor((total % 60000) / 1000); return { days, hours, minutes, seconds, total }; }

    // ---- RENDER UI FROM allStreams ----
    function renderFeatured() {
        const featured = allStreams.filter(s => s.featured);
        const section = document.getElementById('featuredSection'), track = document.getElementById('sliderTrack'), dots = document.getElementById('sliderDots');
        if (!featured.length) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        track.innerHTML = featured.map(stream => `<div class="slide" onclick="handleStreamClick('${stream.id}')"><img src="${stream.thumbnail}" onerror="this.style.background='#1a1a2e'"><div class="slide-overlay"><div class="slide-badge">Featured</div><div class="slide-title">${escapeHtml(stream.name)}</div></div></div>`).join('');
        dots.innerHTML = featured.map((_,i) => `<div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');
        if(sliderInterval) clearInterval(sliderInterval);
        currentSlide = 0;
        if(featured.length>1) sliderInterval = setInterval(()=>{ currentSlide = (currentSlide+1)%featured.length; updateSlider(); },4000);
    }
    function updateSlider() { document.getElementById('sliderTrack').style.transform = `translateX(-${currentSlide*100}%)`; document.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('active', i===currentSlide)); }
    function goToSlide(i) { currentSlide=i; updateSlider(); }

    function renderStreams() {
        const upcoming = allStreams.filter(s => !isLive(s));
        const live = allStreams.filter(s => isLive(s));
        document.getElementById('count-upcoming').textContent = upcoming.length;
        document.getElementById('count-live').textContent = live.length;
        renderGrid('liveGrid', live, true);
        renderGrid('upcomingGrid', upcoming, false);
    }
    function renderGrid(elementId, streams, isLiveSection) {
        const grid = document.getElementById(elementId);
        if(!streams.length){ grid.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">${isLiveSection?'<path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>':'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'}</svg><p>${isLiveSection?'No live streams':'No upcoming streams'}</p></div>`; return; }
        grid.innerHTML = streams.map(stream => { const timer = !isLiveSection ? getTimeRemaining(stream.scheduleTime) : null; return `<div class="stream-card" onclick="handleStreamClick('${stream.id}')"><div style="position:relative;"><img src="${stream.thumbnail}" class="card-thumb" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2256%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23444%22 font-size=%228%22%3ENo Image%3C/text%3E%3C/svg%3E'"><div class="card-status ${isLiveSection?'status-live':'status-upcoming'}">${isLiveSection?'Live':'Upcoming'}</div></div><div class="card-body"><div class="card-title">${escapeHtml(stream.name)}</div>${!isLiveSection && timer ? `<div class="card-timer">Starts in <span class="timer-value" id="timer-${stream.id}">${timer.days}d ${timer.hours}h ${timer.minutes}m</span></div>` : ''}</div></div>`; }).join('');
    }
    function renderMoreStreams(excludeId) {
        const others = allStreams.filter(s=>s.id!==excludeId);
        const grid = document.getElementById('moreGrid');
        if(!others.length){ grid.innerHTML='<p style="color:var(--text-muted);text-align:center;grid-column:1/-1;">No other streams</p>'; return; }
        grid.innerHTML = others.map(stream=>`<div class="more-card" onclick="switchStream('${stream.id}')"><img src="${stream.thumbnail}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2256%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a2e%22/%3E%3C/svg%3E'"><div class="more-card-info"><div class="more-card-title">${escapeHtml(stream.name)}</div><div class="more-card-status ${isLive(stream)?'more-status-live':'more-status-upcoming'}">${isLive(stream)?'LIVE NOW':'UPCOMING'}</div></div></div>`).join('');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    function switchTab(tab) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active'); document.getElementById('liveGrid').classList.toggle('hidden-section', tab!=='live'); document.getElementById('upcomingGrid').classList.toggle('hidden-section', tab!=='upcoming'); }

    // ---- Player functions (same as before, but fetch stream from allStreams) ----
    function destroyVideo() { const oldVideo = document.getElementById('videoPlayer'); if(oldVideo){ oldVideo.pause(); oldVideo.src = ''; oldVideo.load(); } if(currentHls){ currentHls.destroy(); currentHls = null; } const parent = document.getElementById('videoContainer'); const newVideo = document.createElement('video'); newVideo.id = 'videoPlayer'; newVideo.playsInline = true; newVideo.preload = 'auto'; newVideo.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block'; parent.insertBefore(newVideo, document.getElementById('blurOverlay')); oldVideo?.parentNode?.removeChild(oldVideo); hideBuffering(); }
    function hideBuffering() { if(!isBuffering) return; isBuffering=false; document.getElementById('blurOverlay').classList.remove('active'); const v = document.getElementById('videoPlayer'); if(v && v.paused) v.play().catch(()=>{}); }
    function showBuffering() { if(isBuffering) return; isBuffering=true; document.getElementById('blurOverlay').classList.add('active'); }
    function setupVideo(m3u8Url) { const v = document.getElementById('videoPlayer'); if(Hls.isSupported()){ currentHls = new Hls({ maxBufferLength:120, maxMaxBufferLength:600, enableWorker:true, liveSyncDurationCount:5, liveMaxLatencyDurationCount:15 }); currentHls.on(Hls.Events.ERROR, (_,data)=>{ if(data.fatal) data.type===Hls.ErrorTypes.NETWORK_ERROR?currentHls.startLoad():data.type===Hls.ErrorTypes.MEDIA_ERROR?currentHls.recoverMediaError():currentHls.destroy(); }); currentHls.on(Hls.Events.MANIFEST_PARSED,()=>{ v.play().catch(()=>{}); updatePlayBtn(true); }); currentHls.loadSource(m3u8Url); currentHls.attachMedia(v); } else if(v.canPlayType('application/vnd.apple.mpegurl')){ v.src=m3u8Url; v.addEventListener('loadedmetadata',()=>v.play().catch(()=>{})); } v.addEventListener('waiting', showBuffering); v.addEventListener('playing', hideBuffering); v.addEventListener('canplay', hideBuffering); }
    function updatePlayBtn(playing) { document.getElementById('playBtn').innerHTML = playing ? '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' : '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; }
    function openPlayer(streamId) { const stream = allStreams.find(s=>s.id===streamId); if(!stream || !isLive(stream)) return; destroyVideo(); currentStreamId=streamId; document.getElementById('playerTitle').textContent=stream.name; document.getElementById('homeScreen').style.display='none'; document.getElementById('upcomingPreview').classList.remove('active'); document.getElementById('playerScreen').classList.add('active'); document.body.style.overflow='hidden'; setupVideo(stream.m3u8Url); renderMoreStreams(streamId); showControls(); }
    function closePlayer() { destroyVideo(); currentStreamId=null; document.getElementById('playerScreen').classList.remove('active'); document.getElementById('homeScreen').style.display='block'; document.body.style.overflow=''; clearTimeout(controlsTimeout); }
    function switchStream(id) { if(id===currentStreamId) return; handleStreamClick(id); }
    function handleStreamClick(streamId) { const stream = allStreams.find(s=>s.id===streamId); if(!stream) return; if(isLive(stream)) openPlayer(streamId); else openUpcomingPreview(streamId); }
    // upcoming preview & auto become live
    function openUpcomingPreview(streamId) { destroyVideo(); const stream = allStreams.find(s=>s.id===streamId); if(!stream || isLive(stream)) { if(isLive(stream)) openPlayer(streamId); return; } pendingUpcomingId = streamId; const targetTime = new Date(stream.scheduleTime); document.getElementById('upcomingThumbImg').src = stream.thumbnail; document.getElementById('upcomingTitle').innerText = stream.name; document.getElementById('upcomingName').innerText = stream.name; document.getElementById('upcomingSchedule').innerText = 'Scheduled for ' + targetTime.toLocaleString(); document.getElementById('homeScreen').style.display='none'; document.getElementById('playerScreen').classList.remove('active'); document.getElementById('upcomingPreview').classList.add('active'); document.body.style.overflow='hidden'; if(upcomingTimerInterval) clearInterval(upcomingTimerInterval); upcomingTimerInterval = setInterval(()=>{ const remaining = getTimeRemaining(targetTime); if(!remaining){ clearInterval(upcomingTimerInterval); upcomingTimerInterval=null; closeUpcomingPreview(); const freshStream = allStreams.find(s=>s.id===streamId); if(freshStream && isLive(freshStream)) openPlayer(streamId); else if(freshStream && !isLive(freshStream)) openUpcomingPreview(streamId); return; } document.getElementById('cd-days').innerText = String(remaining.days).padStart(2,'0'); document.getElementById('cd-hours').innerText = String(remaining.hours).padStart(2,'0'); document.getElementById('cd-minutes').innerText = String(remaining.minutes).padStart(2,'0'); document.getElementById('cd-seconds').innerText = String(remaining.seconds).padStart(2,'0'); },1000); }
    function closeUpcomingPreview() { if(upcomingTimerInterval) clearInterval(upcomingTimerInterval); upcomingTimerInterval=null; pendingUpcomingId=null; document.getElementById('upcomingPreview').classList.remove('active'); document.getElementById('homeScreen').style.display='block'; document.body.style.overflow=''; }
    // controls
    function showControls() { const bar = document.getElementById('controlsBar'); bar.classList.remove('hidden'); controlsVisible = true; resetControlsTimeout(); }
    function hideControls() { const bar = document.getElementById('controlsBar'); bar.classList.add('hidden'); controlsVisible = false; if(controlsTimeout) clearTimeout(controlsTimeout); }
    function resetControlsTimeout() { if(controlsTimeout) clearTimeout(controlsTimeout); const v = document.getElementById('videoPlayer'); if(!v || v.paused) return; controlsTimeout = setTimeout(() => { const video = document.getElementById('videoPlayer'); if(video && !video.paused) hideControls(); }, 4000); }
    function togglePlay() { const v = document.getElementById('videoPlayer'); v.paused ? v.play().catch(()=>{}) : v.pause(); updatePlayBtn(!v.paused); resetControlsTimeout(); showControls(); }
    function toggleMute() { const v = document.getElementById('videoPlayer'); v.muted = !v.muted; const svg = document.getElementById('muteIconSvg'); svg.innerHTML = v.muted ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>' : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>'; resetControlsTimeout(); showControls(); }
    function toggleFullscreen() { const container = document.getElementById('videoContainer'); document.fullscreenElement ? document.exitFullscreen() : container.requestFullscreen?.(); resetControlsTimeout(); }
    function initGlobalPlayerControls() {
        const videoContainer = document.getElementById('videoContainer'), controlsBar = document.getElementById('controlsBar');
        const containerHandler = (e) => { if(controlsBar.contains(e.target)) return; if(controlsVisible) hideControls(); else showControls(); };
        videoContainer.addEventListener('click', containerHandler);
        document.getElementById('playBtn').addEventListener('click', (e)=>{ e.stopPropagation(); togglePlay(); });
        document.getElementById('muteBtn').addEventListener('click', (e)=>{ e.stopPropagation(); toggleMute(); });
        document.getElementById('fullscreenBtn').addEventListener('click', (e)=>{ e.stopPropagation(); toggleFullscreen(); });
    }

    // ---- Firebase realtime listener ----
    streamsRef.on('value', (snapshot) => {
        const newStreams = [];
        snapshot.forEach(child => {
            newStreams.push({ id: child.key, ...child.val() });
        });
        allStreams = newStreams;
        // update all UI components
        renderFeatured();
        renderStreams();
        // if player is active, refresh more streams and check if current stream still exists & is live
        if (currentStreamId) {
            const stillExists = allStreams.find(s=>s.id===currentStreamId);
            if (!stillExists || !isLive(stillExists)) {
                closePlayer();
            } else {
                renderMoreStreams(currentStreamId);
            }
        }
        // if upcoming preview open, check if stream became live
        if (pendingUpcomingId) {
            const stream = allStreams.find(s=>s.id===pendingUpcomingId);
            if (stream && isLive(stream)) {
                closeUpcomingPreview();
                openPlayer(pendingUpcomingId);
            }
        }
    });

    window.onload = () => {
        initGlobalPlayerControls();
        setTimeout(()=> document.getElementById('appLoader').classList.add('hidden'), 1500);
    };
    window.switchTab = switchTab; window.handleStreamClick = handleStreamClick; window.goToSlide = goToSlide; window.closePlayer = closePlayer; window.closeUpcomingPreview = closeUpcomingPreview; window.switchStream = switchStream;
</script>
</body>
</html>
