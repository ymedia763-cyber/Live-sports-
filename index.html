<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the end</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #1a1614, #0c0a09);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, monospace;
      padding: 1.5rem;
    }

    .sad-container {
      max-width: 520px;
      width: 100%;
      background: rgba(18, 15, 14, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 3.5rem;
      border: 1px solid rgba(110, 80, 70, 0.4);
      box-shadow: 0 25px 40px -15px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,240,0.03);
      padding: 2.5rem 1.8rem 3rem;
      text-align: center;
      transition: all 0.2s;
    }

    /* weeping / fallen icon group */
    .broken-icons {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      opacity: 0.85;
    }

    .icon-shadow {
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .title-sad {
      font-size: 4.8rem;
      font-weight: 350;
      letter-spacing: -0.01em;
      color: #d9c8bc;
      text-shadow: 0 2px 5px rgba(0,0,0,0.4);
      margin: 0.8rem 0 0.5rem;
      font-family: 'Times New Roman', 'Inter', serif;
      font-weight: 400;
    }

    .thin-line {
      width: 64px;
      height: 1px;
      background: #7c6354;
      margin: 1rem auto;
      opacity: 0.5;
    }

    .silence {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #a18270;
      text-transform: uppercase;
      margin-top: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    @keyframes fadeDrift {
      0% { opacity: 0; transform: translateY(10px);}
      100% { opacity: 1; transform: translateY(0);}
    }

    .sad-container > * {
      animation: fadeDrift 0.9s ease forwards;
      opacity: 0;
    }
    .sad-container > :nth-child(1) { animation-delay: 0.1s; }
    .sad-container > :nth-child(2) { animation-delay: 0.3s; }
    .sad-container > :nth-child(3) { animation-delay: 0.5s; }
    .sad-container > :nth-child(4) { animation-delay: 0.7s; }
  </style>
</head>
<body>
<div class="sad-container">
  <!-- sorrowful svg icons: no emojis, only beauty in sadness -->
  <div class="broken-icons">
    <!-- wilted petal / fallen drop -->
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="icon-shadow">
      <path d="M12 5C9 5 7 7.5 7 10.5C7 13.5 9 16 12 19C15 16 17 13.5 17 10.5C17 7.5 15 5 12 5Z" fill="#2f2824" stroke="#937a66" stroke-width="1.1"/>
      <path d="M12 5L12 2" stroke="#9b7e66" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M12 19L12 21" stroke="#9b7e66" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M8.5 13.5C7.5 14 7 14.8 7 15.5" stroke="#ba9a82" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      <circle cx="12" cy="10" r="0.9" fill="#cbb29a" stroke="none"/>
    </svg>

    <!-- broken heart split -->
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="icon-shadow">
      <path d="M12 20L5.5 13.5C3.5 11.5 3.5 8.5 5.5 6.5C7.5 4.5 10 4.5 12 6.5C14 4.5 16.5 4.5 18.5 6.5C20.5 8.5 20.5 11.5 18.5 13.5L12 20Z" fill="#2b221e" stroke="#aa8872" stroke-width="1.1"/>
      <path d="M12 20L9 17" stroke="#bc9780" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M15 14L12 11" stroke="#bc9780" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M9 14L12 11" stroke="#bc9780" stroke-width="1.2" stroke-linecap="round"/>
    </svg>

    <!-- lost horizon / setting sun -->
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="icon-shadow">
      <circle cx="12" cy="12" r="5" fill="#4a3428" stroke="#b28b70" stroke-width="1" stroke-dasharray="1.5 1.5"/>
      <path d="M12 19L12 21" stroke="#b07f62" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M5 12L3 12" stroke="#b07f62" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M19 12L21 12" stroke="#b07f62" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M7.5 7L6 5.5" stroke="#b07f62" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M16.5 7L18 5.5" stroke="#b07f62" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M12 2L12 4" stroke="#b07f62" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M8 16.5C9 15.5 10 15 12 15" stroke="#ccaa92" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- main text: The End (minimal, sad tone) -->
  <h1 class="title-sad">The End</h1>
  <div class="thin-line"></div>

  <!-- only necessary melancholic trace - no extra words, just atmosphere -->
  <div class="silence">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 6V12L16 14" stroke="#b48769" stroke-width="1.3" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="9" stroke="#b48769" stroke-width="1.2" stroke-dasharray="2 2"/>
    </svg>
    <span style="font-size:0.7rem;">·</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 18V12L8 10" stroke="#b48769" stroke-width="1.3" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="9" stroke="#b48769" stroke-width="1.2" stroke-dasharray="2 2"/>
    </svg>
  </div>
</div>
</body>
</html>
